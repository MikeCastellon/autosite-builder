[build]
  command = "npm install --prefix netlify/functions && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "node ./node_modules/vite/bin/vite.js --port 5190"
  targetPort = 5190
  port = 8890
  host = "127.0.0.1"
  publish = "dist"
  autoLaunch = false

# Widget assets embedded on published sites must always be fresh so owner
# setting changes (theme, logo, services) appear without requiring a site
# republish or a hard browser refresh.
[[headers]]
  for = "/scheduler.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
